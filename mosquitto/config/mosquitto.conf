# ──────────────────────────────────────────────
# Listener MQTT estándar (para backend .NET)
# ──────────────────────────────────────────────
listener 1883
protocol mqtt

# ──────────────────────────────────────────────
# Listener WebSockets (opcional: conexión directa desde el navegador)
# ──────────────────────────────────────────────
listener 9001
protocol websockets

# Permitir conexiones sin usuario/contraseña (modo desarrollo)
allow_anonymous true

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
